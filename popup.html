<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>网盘通</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <!-- 顶部区域：头像、昵称、设置按钮 -->
  <div class="header">
    <div class="header-left">
      <div class="avatar-wrapper" id="avatarWrapper" title="点击打开设置">
        <img id="avatarImg" src="icons/avatar-default.svg" alt="头像" class="avatar">
        <div class="avatar-ring"></div>
      </div>
      <div class="user-info">
        <span class="nickname" id="nicknameDisplay">未设置</span>
        <span class="email" id="emailDisplay"></span>
      </div>
    </div>
    <div class="header-right">
      <button class="icon-btn settings-btn" id="settingsBtn" title="设置">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
      </button>
    </div>
  </div>

  <!-- 搜索框 -->
  <div class="search-box">
    <svg class="search-icon" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
    </svg>
    <input type="text" id="searchInput" placeholder="搜索网盘..." autocomplete="off">
    <button class="clear-btn" id="clearSearch" style="display:none;" title="清除搜索">
      <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
      </svg>
    </button>
  </div>

  <!-- 分类标签 -->
  <div class="category-tabs" id="categoryTabs">
    <button class="tab-btn active" data-category="my">我的网盘</button>
    <button class="tab-btn" data-category="all">全部网盘</button>
  </div>

  <!-- 网盘列表 -->
  <div class="drive-list" id="driveList">
    <!-- 动态渲染 -->
    <div class="loading" id="loading">
      <div class="spinner"></div>
      <span>加载中...</span>
    </div>
  </div>

  <!-- 空状态 -->
  <div class="empty-state" id="emptyState" style="display:none;">
    <svg viewBox="0 0 24 24" width="48" height="48" fill="none" stroke="currentColor" stroke-width="1.5" opacity="0.3">
      <path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"/>
      <polyline points="13 2 13 9 20 9"/>
    </svg>
    <p id="emptyText">暂无数据</p>
    <button class="add-drive-btn" id="addDriveBtn" style="display:none;">+ 添加网盘账号</button>
  </div>

  <!-- 底部信息 -->
  <div class="footer">
    <span>网盘通 v1.0.0</span>
    <span class="sync-status" id="syncStatus" title="同步状态">
      <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2">
        <polyline points="23 4 23 10 17 10"/>
        <polyline points="1 20 1 14 7 14"/>
        <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
      </svg>
      已同步
    </span>
  </div>

  <script src="drives-config.js"></script>
  <script src="popup.js"></script>
</body>
</html>
